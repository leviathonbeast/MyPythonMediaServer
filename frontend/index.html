<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d0e" />
    <title>MUSE — a sound library</title>

    <!--
      WHY these fonts:
        Fraunces  — variable serif, characterful, used for display & headings.
                    Variable axes (opsz, soft, wonk) give us editorial range
                    without shipping a dozen weights.
        JetBrains Mono — used for labels, data, track listings, IDs.
                    Reinforces the "library / catalog" feel.
      Both are loaded once with `display=swap` so first paint is never blocked.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
